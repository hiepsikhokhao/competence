services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: competency
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d competency"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@db:5432/competency
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3012}:3012"
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@db:5432/competency
      AUTH_SECRET: ${AUTH_SECRET:-please-change-this-secret-in-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3012}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
